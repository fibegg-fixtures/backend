services:
  api:
    image: python:3.12-slim
    working_dir: /app
    depends_on: [kafka]
    ports: ["8000:8000"]
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/venv
      KAFKA: kafka:29092
      TOPIC: people
    volumes: ["./:/app"]
    command: sh -c "pip install uv && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips \"*\""
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request; r=urllib.request.urlopen("http://localhost:8000/events", timeout=5); data=r.readline()+r.readline(); raise SystemExit(0 if b'"ok": true' in data else 1)
      interval: 5s
      timeout: 6s
      retries: 30
    labels:
      fibe.gg/repo_url: https://github.com/fibegg-fixtures/backend
      fibe.gg/branch: main
      fibe.gg/source_mount: /app
      fibe.gg/production: "false"
      fibe.gg/start_command: sh -c "pip install uv && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips \"*\""
      fibe.gg/port: 8000
      fibe.gg/visibility: external
      fibe.gg/subdomain: api-people

  frontend:
    image: node:22-slim
    working_dir: /app
    depends_on: [api]
    ports: ["5173:5173"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_INTERVAL: 5
      VITE_API: http://localhost:8000
    volumes:
      - "../frontend:/app"
      - "frontend_node_modules:/app/node_modules"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:5173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 30
    labels:
      fibe.gg/repo_url: https://github.com/fibegg-fixtures/frontend
      fibe.gg/branch: main
      fibe.gg/source_mount: /app
      fibe.gg/production: "false"
      fibe.gg/start_command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
      fibe.gg/port: 5173
      fibe.gg/visibility: external
      fibe.gg/subdomain: people

  kafka:
    image: apache/kafka:4.1.2
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  producer:
    image: python:3.12-slim
    working_dir: /app
    depends_on: [kafka]
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/venv
      X: 5
      TOPIC: people
      KAFKA: kafka:29092
    volumes: ["${FIBE_SERVICES_API_PATH:-.}:/app"]
    command: sh -c "pip install uv && uv run python producer.py"

volumes:
  frontend_node_modules:

x-fibe.gg:
  variables:
    VITE_API:
      name: "Vite API URL"
      required: true
      default: "https://api-people.fibe.live"
      path: services.frontend.environment.VITE_API
    API_SUBDOMAIN:
      name: "API subdomain name"
      required: true
      default: "api-people"
      path: services.api.labels.fibe.gg/subdomain
    SUBDOMAIN:
      name: "Vite API URL"
      required: true
      default: "people"
      path: services.frontend.labels.fibe.gg/subdomain
    INTERVAL:
      name: "Interval"
      required: true
      default: "5"
      validation: "/^[0-9]+$/"
      paths:
        - services.frontend.environment.VITE_INTERVAL
        - services.producer.environment.X
  metadata:
    description: "People Stream Application"
    category: "Development"
    source_defaults: true
